<!DOCTYPE html>
<html lang="en">

<head>
    <!-- ============================================= Meta tags ============================================= -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dental Supplies Input, Egyptian Ministry of Health & Population,
    Alexandria Health Affairs Directorate, Public Administration of Dental Health">

    <!-- ============================================= CSS files ============================================= -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="shortcut icon" href="../svg/portrait-PADH-light.svg" type="image/x-icon">

    <!-- ============================================= CSS font Awesome files ============================================= -->
    <link rel="stylesheet" href="../css/font-awesome.css">
    <!-- == Normalize means, that file can fix any webkit without adding webkit for all classes == -->
    <link rel="stylesheet" href="../css/normalize.css">
    <!-- ============================================= google font ============================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <!-- ============================================= CSS Master document files ============================================= -->
    <link rel="stylesheet" href="../css/main.css">
    <!-- ============================================= print media CSS ============================================= -->
    <link rel="stylesheet" href="../css/print.css">
    <!-- ============================================= tab title ============================================= -->
    <title>Dental Supply Input</title>
</head>

<body>
    <div id="PADHANavBar"></div>

    <!-- ============================================= Container ============================================= -->

    <main class="container master-color mobile-padding supply">
        <div class="row pt-5 pb-2">
            <div class="col-lg-4 col-md-12 mb-2">
                <label><i class="fa-solid fa-asterisk"></i>Medical District</label>
                <input type="text" class="form-control" value="Al Montaza Medical District" disabled>
            </div>
            <div class="col-lg-2 col-md-6 col-6 mb-2">
                <label><i class="fa-solid fa-asterisk"></i>Division</label>
                <select id="supDivision" class="form-select" aria-label="Default select example"
                    onchange="supDivisionValid()" required>
                    <option value="">Choose...</option>
                    <option value="Free">Free</option>
                    <option value="Economic">Economic</option>
                </select>
                <div id="supDivisionValid" class="valid-select"></div>
            </div>
            <div class="col-lg-2 col-md-6 col-6 mb-2">
                <label><i class="fa-solid fa-asterisk"></i>Month</label>
                <select id="supMonth" class="form-select" aria-label="Default select example" onchange="supMonthValid()"
                    required>
                    <option value="">Choose...</option>
                    <option value="January">January</option>
                    <option value="February">February</option>
                    <option value="March">March</option>
                    <option value="April">April</option>
                    <option value="May">May</option>
                    <option value="June">June</option>
                    <option value="July">July</option>
                    <option value="August">August</option>
                    <option value="Septemper">Septemper</option>
                    <option value="October">October</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                </select>
                <div id="supMonthValid" class="valid-select"></div>
            </div>
            <div class="col-lg-2 col-md-6 col-6">
                <label><i class="fa-solid fa-asterisk"></i>Year</label>
                <input type="number" id="supYear" class="form-control text-center" min="2020" max="2100"
                    onkeyup="supYearValid()">
                <div id="supYearValid" class="valid-input"></div>
            </div>
            <div class="col-lg-2 col-md-6 col-6">
                <label>Supply</label>
                <select class="form-select" aria-label="Default select example" disabled>
                    <option value="Dedicated">Dedicated</option>
                    <option value="Extra I">Extra I</option>
                </select>
            </div>
        </div>
        <hr>

        <div class="row g-3">
            <div class="col-lg-3 col-md-4 col-12">
                <label><i class="fa-solid fa-asterisk"></i>Item Group</label>
                <select id="supItemGroup" class="form-select" aria-label="Default select example" required
                    onchange="supItemGroupValid()">
                    <option value="">Choose...</option>
                    <option value="Devices">Devices</option>
                    <option value="Instraument">Instraument</option>
                    <option value="Dental Material">Dental Material</option>
                    <option value="Infection Control Materials">Infection Control Materials</option>
                </select>
                <div id="supItemGroupValid" class="valid-select"></div>

            </div>
            <div class="col-lg-5 col-md-8">
                <label><i class="fa-solid fa-asterisk"></i>Item Label</label>
                <select id="supItemLabel" class="form-select" aria-label="Default select example"
                    onchange="supItemLabelValid()" disabled required>
                    <option value="">All</option>
                    <option value="Devices Amalgamator">Amalgamator</option>
                    <option value="Devices Cavitron">Cavitron</option>
                    <option value="Devices High Speed Handpiece">High Speed Handpiece</option>
                    <option value="Devices Low Speed Handpiece">Low Speed Handpiece</option>
                    <option value="Instraument K-Files 15-40">K-Files 15-40</option>
                    <option value="Instraument K-Files 45-80">K-Files 45-80</option>
                    <option value="Instraument H-Files 15-40">H-Files 15-40</option>
                    <option value="Instraument H-Files 45-80">H-Files 45-80</option>
                    <option value="Instraument Mirror">Mirror</option>
                    <option value="Instraument Scaler">Scaler</option>
                    <option value="Instraument Excavator">Excavator</option>
                    <option value="Dental Material Amalgam">Amalgam</option>
                    <option value="Dental Material Composite">Composite</option>
                    <option value="Dental Material GIC">GIC</option>
                    <option value="Dental Material Sealer">Sealer</option>
                    <option value="Infection Control Materials">All</option>
                    <option value="Infection Control Materials Latex Gloves">Latex Gloves</option>
                    <option value="Infection Control Materials Gaune">Gaune</option>
                    <option value="Infection Control Materials Surgical Mask">Surgical Mask</option>
                    <option value="Infection Control Materials Highly Effecient Mask N95">Highly Effecient Mask N95
                    </option>
                </select>
                <div id="supItemLabelValid" class="valid-select"></div>

            </div>
            <div class="col-lg-2 col-md-6 col-6">
                <label><i class="fa-solid fa-asterisk"></i>Item Type</label>
                <select id="supType" class="form-select" aria-label="Default select example" onchange="supTypeValid()">
                    <option value="">Choose...</option>
                    <option value="Backet">Backet</option>
                    <option value="Glass">Glass</option>
                    <option value="Unit">Unit</option>
                    <option value="Syringe">Syringe</option>
                    <option value="Piece">Piece</option>
                </select>
                <div id="supTypeValid" class="valid-select"></div>

            </div>
            <div class="col-lg-2 col-md-6 col-6">
                <label><i class="fa-solid fa-asterisk"></i>Amount</label>
                <input type="number" id="supAmount" class="form-control text-center" min="1" max="999" required
                    onkeyup="supAmountValid()">
                <div id="supAmountValid" class="valid-input"></div>
            </div>
            <div class="col-lg-4 col-md-6 col-6">
                <button class="btn" id="supAddItem">
                    <i id="supAddItemIcon" class="fa-solid fa-plus"></i>Add Item to Chart</button>
            </div>
            <div class="col-lg-4 col-md-6 col-6">
                <button class="btn btn-grey" id="supClearItem"><i class="fa-solid fa-eraser"></i>Clear Input
                    Data</button>
            </div>
            <div class="col-lg-4 col-md-12 col-12" id="supDeleteAll">
            </div>
        </div>

        <h5 class="med-table-h5">Items You Added</h5>

        <div class="table-responsive">
            <table class="table align-middle table-hover" id="SuppliesInTable">
                <thead>
                    <tr>
                        <th scope="col" class="text-nowrap">ID</th>
                        <th scope="col" class="text-nowrap">Division</th>
                        <th scope="col" class="text-nowrap">Month</th>
                        <th scope="col" class="text-nowrap">Year</th>
                        <th scope="col" class="text-nowrap">Item Group</th>
                        <th scope="col" class="text-nowrap">Item Label</th>
                        <th scope="col" class="text-nowrap">Type</th>
                        <th scope="col" class="text-nowrap">Amount</th>
                        <th scope="col" class="text-nowrap">Edit</th>
                        <th scope="col" class="text-nowrap">Delete</th>
                    </tr>
                </thead>
                <tbody id="tbodySupply">

                </tbody>
            </table>
        </div>

        <div id="confirmInputs"></div>
    </main>

    <div id="configModal" class="config-modal">
        <div class="config-modal-box">
            <h2><i class="fa-solid fa-trash-can"></i>Delete All Items</h2>
            <h6>Are you sure you want to delete All ?</h6>
            <p><i class="fa-solid fa-ban"></i>You will Lose All Inputs you Added</p>
            <div class="row g-3 buttons">
                <div class="col-lg-6 justify-content-start">
                    <button onclick="modalDelete()" class="btn btn-red"><i class="fa-solid fa-trash"></i>Delete</button>
                </div>
                <div class="col-lg-6">
                    <button onclick="modalCancel()" id="modalCancel" class="btn btn-grey">
                        <i class="fa-solid fa-xmark"></i>Cancel</button>
                </div>

            </div>
        </div>
    </div>

    <div id="configModalItem" class="config-modal">
        <div class="config-modal-box">
            <h2><i class="fa-solid fa-trash-can"></i>Delete Item</h2>
            <h6>Are you sure you want to delete this ?</h6>
            <p><i class="fa-solid fa-ban"></i>You will Lose All Item Data</p>
            <div class="row g-3 buttons">
                <div class="col-lg-6 justify-content-start">
                    <button onclick="modalDeleteItem()" class="btn btn-red"><i
                            class="fa-solid fa-trash"></i>Delete</button>
                </div>
                <div class="col-lg-6">
                    <button onclick="modalCancel()" class="btn btn-grey">
                        <i class="fa-solid fa-xmark"></i>Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="PADHAFooter"></div>


</body>

<!-- ========================================= Javascript, Jquery & owl scripts ========================================= -->

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
    integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
    crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
    integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
    crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
<script src="../js/medSupIn.js"></script>
<script src="../js/NavBars.js"></script>
<script src="../js/search.js"></script>
<script src="../js/main.js"></script>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-form</title>
    <link rel="shortcut icon" href="../Callisign_Codes/Images/13.png" type="image/x-icon" />
    <link rel="Stylesheet" href="../Callisign_Codes/CSS/Login-form.css">
</head>

<body>
    <div class="login-page">
        <div class="form-box">
            <div class="Button-box">
                <div id="btn"></div>
                <button type="button" class="Toggle-Button" onclick="Login()">Log In</button>
                <button type="button" class="Toggle-Button" onclick="Register()">Register</button>
                <div class="Social-media">
                    <a id="facebook" href="https://facebook.com/callisign.art" target="_blank"
                        title="Visit Our Facebook page"><img src="../Callisign_Codes/Images/FB.jpg"></a>
                    <a id="Instagram" href="https://instagram.com/callisign.art" target="_blank"
                        title="Visit Our Facebook page"><img src="../Callisign_Codes/Images/insta.jpg"></a>
                    <a id="Whatsapp" href="https://api.whatsapp.com/send?phone=201118369608&app=facebook&entry_
                        point=page_cta&fbclid=IwAR3OdRZN4x5atRtsbe8g4R1KwvKJwEQRoElQYXXwrrDwmm7ts7MxsUAsC7g"
                        target="_blank" title="Contact Us Via Whatsapp"><img
                            src="../Callisign_Codes/Images/whats.jpg"></a>
                </div>
            </div>
            <form id="Login" class="input-gp">
                <input class="input-field" type="text" placeholder="User Name" name="Username" autofocus required>
                <input class="input-field" type="password" name="Password" placeholder="Write a complex Password"
                    required>
                <input id="remember-me" class="check-box" type="checkbox"><span><label for="remember-me">Remember
                        Me</label></span>
                <button class="submit-btn" type="submit">Log In</button>
            </form>
            <form id="Register" class="input-gp">
                <input class="input-field" type="text" placeholder="User Name" name="Username" autofocus required>
                <input class="input-field" type="email" placeholder="Enter Your email address" name="emmail" required>
                <input class="input-field" type="password" name="Password" placeholder="Write a complex Password"
                    required>
                <input id="agree-to-terms" class="check-box" type="checkbox"><span><label for="agree-to-terms">I Agree
                        to the terms and conditions</label></span>
                <button class="submit-btn" type="submit">Register</button>
            </form>
            <script>
                var x = document.getElementById("Login")
                var y = document.getElementById("Register")
                var z = document.getElementById("btn")

                function Register() {
                    x.style.left = "-400px";
                    y.style.left = "0px";
                    z.style.left = "110px";
                }
                function Login() {
                    x.style.left = "0";
                    y.style.left = "450px";
                    z.style.left = "0";
                }
            </script>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>

</head>

<body>
  <div id="PADHANavBar"></div>

  <!-- ====================================================================================================================
     ------------------------------------------------- Registration Form ------------------------------------------------
     ==================================================================================================================== -->
  <div class="master-color mobile-padding mt-5">
    <div class="container">
      <main>
        <div class="row gx-5">
          <div class="col-lg-3 col-md-12">
            <div class="new-profile-pic">
              <div class="new-profile-front">
                <img src="../Images/avatar.png" alt="" />
              </div>
              <div class="new-profile-back">
                <a href="#"><i class="fa-solid fa-arrow-up-from-bracket"></i>Upload</a>
                <a href="#"><i class="fa-solid fa-pen-to-square"></i>Edit</a>
                <a href="#"><i class="fa-solid fa-trash-can"></i>Remove</a>
              </div>
            </div>
            <hr class="my-4" />
            <div class="d-none d-lg-block">
              <div class="specialities-sidebar-list">
                <h5>You Also Need</h5>
                <a href="../html/message.html" class="specialities-sidebar-item">
                  <i class="fa-solid fa-message"></i>Vision & Mission</a>
                <a href="../html/team.html" class="specialities-sidebar-item">
                  <i class="fa-solid fa-users"></i>Our Team</a>
                <a href="../html/contact.html" class="specialities-sidebar-item">
                  <i class="fa-solid fa-phone"></i>Contact Us</a>
                <a href="../html/terms.html" class="specialities-sidebar-item">
                  <i class="fa-solid fa-scale-balanced"></i>Terms &
                  Conditions</a>
                <a href="../html/privacy.html" class="specialities-sidebar-item">
                  <i class="fa-solid fa-shield"></i>Privacy & Policy</a>

                <div class="mb-5"></div>
              </div>
            </div>
          </div>
          <div class="col-lg-9 col-md-12">
            <!-- ===========================================================================================
                            -------------------------------------------- Personal Data --------------------------------- 
                            ============================================================================================ -->
            <div class="data">
              <h4><i class="fa-solid fa-user data-icon"></i>Personal Data</h4>
              <div class="row g-3">
                <div class="col-md-3 col-sm-12">
                  <label for="firstName" class="form-label">
                    <i class="fa-solid fa-asterisk"></i>First name</label>
                  <input type="text" class="form-control" id="firstName" placeholder="Ahmed">
                </div>
                <div class="col-md-9 col-sm-12">
                  <label for="lastName" class="form-label"><i class="fa-solid fa-asterisk"></i>Last name</label>
                  <input type="text" class="form-control" id="lastName" placeholder="Last Name">
                </div>
                <div class="col-md-9 col-sm-12">
                  <label for="lastNameAr" class="form-label"><i class="fa-solid fa-asterisk"></i>Last name In
                    Arabic</label>
                  <input type="text" class="form-control text-right" id="lastNameAr" placeholder="احمد محمد العزبى">
                </div>
                <div class="col-md-3 col-sm-12">
                  <label for="firstNameAr" class="form-label">
                    <i class="fa-solid fa-asterisk"></i>First name In Arabic</label>
                  <input type="text" class="form-control text-right" id="firstNameAr" placeholder="ياسر">
                </div>
                <div class="col-md-8 col-sm-12">
                  <label for="address" class="form-label">Address</label>
                  <input type="text" class="form-control" id="address" placeholder="1234 Main St">
                </div>
                <div class="col-md-4 col-sm-12">
                  <label for="government" class="form-label">Government</label>
                  <select class="form-select" id="government" required="" placeholder="Choose...">
                    <option value="">Choose...</option>
                    <option value="Alexandria">Alexandria</option>
                    <option value="Aswan">Aswan</option>
                    <option value="Asyut">Asyut</option>
                    <option value="Beheira">Beheira</option>
                    <option value="Beni Suef">Beni Suef</option>
                    <option value="Cairo">Cairo</option>
                    <option value="Dakahlia">Dakahlia</option>
                    <option value="Damietta">Damietta</option>
                    <option value="Faiyum">Faiyum</option>
                    <option value="Gharbia">Gharbia</option>
                    <option value="Giza">Giza</option>
                    <option value="Ismailia">Ismailia</option>
                    <option value="Kafr El Sheikh">Kafr El Sheikh</option>
                    <option value="Luxor">Luxor</option>
                    <option value="Matruh">Matruh</option>
                    <option value="Minya">Minya</option>
                    <option value="Monufia">Monufia</option>
                    <option value="New Valley">New Valley</option>
                    <option value="North Sinai">North Sinai</option>
                    <option value="North Sinai">North Sinai</option>
                    <option value="Minya">Minya</option>
                    <option value="Qalyubia">Qalyubia</option>
                    <option value="Qena">Qena</option>
                    <option value="Red Sea">Red Sea</option>
                    <option value="Sharqia">Sharqia</option>
                    <option value="Sohag">Sohag</option>
                    <option value="South Sinai">South Sinai</option>
                    <option value="Suez">Suez</option>
                  </select>
                </div>
                <div class="col-lg-5 col-md-12">
                  <label for="NationalID" class="form-label">
                    <i class="fa-solid fa-asterisk"></i>National ID</label>
                  <input type="number" class="form-control" id="nationalID" placeholder="write you National ID"
                    onkeyup="dateOfBirthCalc()">
                </div>
                <div class="col-lg-4 col-md-6 col-6">
                  <label for="dateOfBirth" class="form-label">
                    <i class="fa-solid fa-asterisk"></i>Date of Birth</label>
                  <input type="date" class="form-control" disabled id="dateOfBirth">
                </div>
                <div class="col-lg-3 col-md-6 col-6">
                  <label for="gender" class="form-label"><i class="fa-solid fa-asterisk"></i>Gender</label>
                  <input type="text" class="form-control" disabled id="gender">
                </div>
                <div class="col-md-6 col-sm-12 col-6">
                  <label for="phoneNumberOne" class="form-label">
                    <i class="fa-solid fa-asterisk"></i>Phone number</label>
                  <input type="number" class="form-control" id="phoneNumberOne" placeholder="Write a valid phone Number"
                    required="" maxlength="11" minlength="11" />
                </div>
                <div class="col-md-6 col-sm-12 col-6">
                  <label for="phoneNumberTwo" class="form-label">Another Phone</label>
                  <input type="number" class="form-control" id="phoneNumberTwo" placeholder="Write a valid phone Number"
                    required="" maxlength="11" minlength="11" />
                </div>
              </div>
            </div>

            <!-- ===========================================================================================
                            -------------------------------------- Greaduation Data ---------------------------------------- 
                            ============================================================================================ -->
            <div class="data">
              <h4>
                <i class="fa-solid fa-graduation-cap data-icon"></i>Graduation
                Data
              </h4>
              <div class="row g-3">
                <div class="col-md-3 col-sm-5">
                  <label for="jobTitle" class="form-label"><i class="fa-solid fa-asterisk"></i>Job title</label>
                  <select class="form-select" id="jobTitle" required="">
                    <option value="">Choose...</option>
                    <option value="Dentist">Dentist</option>
                    <option value="Technician">Technician</option>
                  </select>
                </div>
                <div class="col-md-7 col-sm-7 col-8">
                  <label for="graduationUniversity" class="form-label"><i class="fa-solid fa-asterisk"></i>Graduation
                    University</label>
                  <select class="form-select" required="" id="graduationUniversity">
                    <option value="">Choose...</option>
                    <option value="Alexandria University">
                      Alexandria University
                    </option>
                    <option value="Pharos University">
                      Pharos University
                    </option>
                    <option value="Cairo University">Cairo University</option>
                    <option value="Another">Another</option>
                  </select>
                </div>
                <div class="col-md-2 col-sm-3 col-4">
                  <label for="graduationYear" class="form-label">
                    <i class="fa-solid fa-asterisk"></i>Year</label>
                  <input type="number" class="form-control text-center" id="graduationYear" placeholder="" required=""
                    maxlength="4" minlength="4" />
                </div>

                <div class="col-lg-5 col-md-7">
                  <label class="form-label" for="profDiploma">Diploma</label>
                  <select id="profDiploma" class="form-select">
                    <option selected>Choose...</option>
                    <option>Diploma Of Business Administration</option>
                    <option>Diploma Of Orthodontics</option>
                    <option>Diploma Of Prosthodontics</option>
                    <option>Diploma Of Pedodontics</option>
                    <option>Diploma Of Public Dental Health</option>
                  </select>
                </div>
                <div class="col-md-5 col-sm-7 col-8">
                  <label for="DiplomaUniv" class="form-label">Diploma University</label>
                  <select class="form-select" required="" id="DiplomaUniv">
                    <option value="">Choose...</option>
                    <option>Alexandria University</option>
                    <option>Pharos University</option>
                    <option>Cairo University</option>
                    <option>Another</option>
                  </select>
                </div>
                <div class="col-md-2 col-sm-3 col-4">
                  <label for="diplomaYear" class="form-label">Diploma Year</label>
                  <input type="number" class="form-control text-center" id="diplomaYear" required>
                </div>

                <div class="col-lg-5 col-md-7">
                  <label class="form-label" for="masterDegree">Master</label>
                  <select id="masterDegree" class="form-select">
                    <option selected>Choose...</option>
                    <option>Master Of Business Administration</option>
                    <option>Master Of Orthodontics</option>
                    <option>Master Of Prosthodontics</option>
                    <option>Master Of Pedodontics</option>
                    <option>Master Of Public Dental Health</option>
                  </select>
                </div>
                <div class="col-md-5 col-sm-7 col-8">
                  <label for="masterUniv" class="form-label">Master University</label>
                  <select class="form-select" required="" id="masterUniv">
                    <option value="">Choose...</option>
                    <option>Alexandria University</option>
                    <option>Pharos University</option>
                    <option>Cairo University</option>
                    <option>Another</option>
                  </select>
                </div>
                <div class="col-md-2 col-sm-3 col-4">
                  <label for="masterYear" class="form-label">Master Year</label>
                  <input type="number" class="form-control text-center" id="masterYear" required>
                </div>

                <div class="col-lg-5 col-md-7">
                  <label class="form-label" for="PhDDegree">PhD</label>
                  <select id="PhDDegree" class="form-select">
                    <option selected>Choose...</option>
                    <option>PhD Of Business Administration</option>
                    <option>PhD Of Orthodontics</option>
                    <option>PhD Of Prosthodontics</option>
                    <option>PhD Of Pedodontics</option>
                    <option>PhD Of Public Dental Health</option>
                  </select>
                </div>
                <div class="col-md-5 col-sm-7 col-8">
                  <label for="PhDUniv" class="form-label">PhD University</label>
                  <select class="form-select" required="" id="PhDUniv">
                    <option value="">Choose...</option>
                    <option>Alexandria University</option>
                    <option>Pharos University</option>
                    <option>Cairo University</option>
                    <option>Another</option>
                  </select>
                </div>
                <div class="col-md-2 col-sm-3 col-4">
                  <label for="PhDYear" class="form-label">PhD Year</label>
                  <input type="number" class="form-control text-center" id="PhDYear" required>
                </div>

              </div>
            </div>

            <!-- =======================================================================================
            ------------------------------------------ Job Data ---------------------------------------- 
            ============================================================================================ -->
            <div class="data">
              <h4><i class="fa-solid fa-briefcase data-icon"></i>Job Data</h4>
              <div class="row g-3">
                <div class="col-lg-4 col-md-6">
                  <label for="medicalDistrct" class="form-label"><i class="fa-solid fa-asterisk"></i>Medical
                    Distrct</label>
                  <select class="form-select" id="medicalDistrct" required>
                    <option value="">Choose...</option>
                    <option value="alMontaza">Al Montaza</option>
                    <option value="east">East</option>
                    <option value="middle">Middle</option>
                    <option value="west">West</option>
                    <option value="alGomrok">Al Gomrok</option>
                    <option value="alAgamy">Al Agamy</option>
                    <option value="alAmriya">Al Amriya</option>
                    <option value="borgAlArab">Borg Al Arab</option>
                  </select>
                </div>
                <div class="col-lg-4 col-md-6">
                  <label for="medicalUnit" class="form-label"><i class="fa-solid fa-asterisk"></i>Medical Unit</label>
                  <select class="form-select" id="medicalUnit" required="">
                    <option value="alMontaza">Choose...</option>
                    <option value="alMontaza"></option>
                  </select>
                </div>
                <div class="col-lg-4 col-md-6 col-6">
                  <label for="jobStartDate" class="form-label">
                    <i class="fa-solid fa-asterisk"></i>Job Start Date</label>
                  <input type="date" class="form-control" id="jobStartDate" placeholder="" required="" />
                </div>
                <div class="col-lg-4 col-md-6 col-6">
                  <label for="JobStatus" class="form-label"><i class="fa-solid fa-asterisk"></i>Job Status</label>
                  <select class="form-select" id="JobStatus" required="">
                    <option value="">regular</option>
                    <option value="pregnant vaccancy">pregnant vaccancy</option>
                    <option value="child-grow vaccanc">child-grow vaccancy</option>
                  </select>
                </div>
                <div class="col-lg-4 col-md-6 col-6">
                  <label for="JobType" class="form-label"><i class="fa-solid fa-asterisk"></i>Job type</label>
                  <select class="form-select" id="JobType" required="">
                    <option value="fullTime">Full time</option>
                    <option value="partTime">Part time</option>
                    <option value="none">None</option>
                  </select>
                </div>
                <div class="col-lg-4 col-md-6 col-6">
                  <label for="jobTypeEndDate" class="form-label">End Date</label>
                  <input type="date" class="form-control" id="jobTypeEndDate" />
                </div>
                <div class="col-lg-6 col-md-6">
                  <label for="professionalDegree" class="form-label"><i class="fa-solid fa-asterisk"></i>Professional
                    Degree</label>
                  <select class="form-select" id="professionalDegree" required="">
                    <option value="">General Parctitioner</option>
                    <option value="Specialist">Specialist</option>
                    <option value="AssistantConsultant">Assistant Consultant</option>
                    <option value="AssistantSpecialist">Assistant Specialist</option>
                    <option value="Consultant">Consultant</option>
                  </select>
                </div>
                <div class="col-md-2 col-6">
                  <label for="decisionNumber" class="form-label">Number</label>
                  <input type="text" class="form-control text-center" id="decisionNumber" maxlength="4" minlength="4" />
                </div>
                <div class="col-md-4 col-6">
                  <label for="promotionDate" class="form-label">Promotion Date</label>
                  <input type="date" class="form-control" id="promotionDate" />
                </div>
                <div class="col-md-6">
                  <label for="specializedDepartment" class="form-label">Department
                    <span class="black-color">( Filled in Hospitals & Centers )</span></label>
                  <select class="form-select" id="specializedDepartment">
                    <option value="">Choose...</option>
                    <option value="">Oral Pathology</option>
                    <option value="">Implantology</option>
                    <option value="">Operative Dentistry</option>
                    <option value="">Fixed Prosthodontics</option>
                    <option value="">Removable Prosthodontics</option>
                    <option value="">Pedodontics</option>
                    <option value="">Infection Control</option>
                    <option value="">Oral Surgery</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="adminJobTitle" class="form-label">Administrative job title</label>
                  <select class="form-select" id="adminJobTitle" required="">
                    <option value="">Choose...</option>
                    <option value="">Manager</option>
                    <option value="">Dental Head chair</option>
                    <option value="">Vice Dental Head chair</option>
                    <option value="">Head of Dental</option>
                    <option value="">Head of</option>
                  </select>
                </div>
                <div class="col-md-6 col-6">
                  <label for="financialDegree" class="form-label"><i class="fa-solid fa-asterisk"></i>Financial
                    degree</label>
                  <select class="form-select" id="financialDegree" required="">
                    <option value="">Major</option>
                    <option>First</option>
                    <option>Second</option>
                    <option>Third</option>
                    <option>Fourth</option>
                  </select>
                </div>
                <div class="col-md-6 col-6">
                  <label for="insuranceNumber" class="form-label">
                    <i class="fa-solid fa-asterisk"></i>Insurance
                    number</label>
                  <input type="text" class="form-control" id="insuranceNumber" placeholder="Insurance Number" required
                    maxlength="8" minlength="8" />
                </div>
              </div>
            </div>

            <!-- =======================================================================================
            ------------------------------------------ Registration Data ------------------------------- 
            ============================================================================================ -->
            <div class="button-design translate-x mt-5">
              <a href="#">Confirm Registration</a>
            </div>



          </div>
        </div>
    </div>
    </main>
  </div>
  </div>

  <div id="PADHAFooter"></div>

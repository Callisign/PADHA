<!DOCTYPE html>
<html lang="en">

<head>
    <!-- ============================================= Meta tags ============================================= -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Egyptian Ministry of Health & Population,
    Alexandria Health Affairs Directorate, Public Administration of Dental Health, Statics">

    <!-- ============================================= CSS files ============================================= -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="shortcut icon" href="../svg/portrait-PADH-light.svg" type="image/x-icon">

    <!-- ============================================= CSS font Awesome files ============================================= -->
    <link rel="stylesheet" href="../css/font-awesome.css">
    <!-- == Normalize means, that file can fix any webkit without adding webkit for all classes == -->
    <link rel="stylesheet" href="../css/normalize.css">
    <!-- ============================================= google font ============================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <!-- ============================================= CSS Master document files ============================================= -->
    <link rel="stylesheet" href="../css/main.css">
    <!-- ============================================= print media CSS ============================================= -->
    <link rel="stylesheet" href="../css/print.css">
    <!-- ============================================= tab title ============================================= -->
    <title>Statics</title>
</head>

<body>
    <div id="PADHANavBar"></div>

    <!-- ================ Main Container ================================================= -->
    <div class="master-color">
        <div class="container">
            <main class="mobile-padding">
                <!-- ==== Search bar ===================================================== -->
                <div class="row pt-5 pb-3 g-3">
                    <div class="col-lg-2 col-md-6">
                        <label for="medical-district" class="form-label"><i class="fa-solid fa-asterisk"></i>Medical
                            District</label>
                        <select id="medical-district" class="form-select">
                            <option value="">Choose ...</option>
                            <option>Al Montaza Medical District</option>
                            <option>East Medical District</option>
                            <option>Middle Medical District</option>
                            <option>West Medical District</option>
                            <option>Al Gomrok Medical District</option>
                            <option>Al Agamy Medical District</option>
                            <option>Al Amriya Medical District</option>
                            <option>Borg Al Arab Medical District</option>
                        </select>
                    </div>
                    <div class="col-lg-3 col-md-6">
                        <label for="medical-district" class="form-label"><i class="fa-solid fa-asterisk"></i>Unit
                            Tilte</label>
                        <select id="medical-district" class="form-select">
                            <option value="">Choose ...</option>
                            <option>Al Montaza Medical District</option>
                            <option>East Medical District</option>
                            <option>Middle Medical District</option>
                            <option>West Medical District</option>
                            <option>Al Gomrok Medical District</option>
                            <option>Al Agamy Medical District</option>
                            <option>Al Amriya Medical District</option>
                            <option>Borg Al Arab Medical District</option>
                        </select>
                    </div>
                    <div class="col-lg-2 col-md-6 col-6">
                        <label for="medical-district" class="form-label"><i
                                class="fa-solid fa-asterisk"></i>Division</label>
                        <select id="medical-district" class="form-select">
                            <option>Theraputic</option>
                            <option>Protective</option>
                        </select>
                    </div>
                    <div class="col-lg-2 col-md-6 col-6">
                        <label for="medical-district" class="form-label"><i
                                class="fa-solid fa-asterisk"></i>Type</label>
                        <select id="medical-district" class="form-select">
                            <option>Free</option>
                            <option>Economic</option>
                        </select>
                    </div>
                    <div class="col-lg-2 col-md-6 col-6">
                        <label for="medical-district" class="form-label"><i
                                class="fa-solid fa-asterisk"></i>Month</label>
                        <select id="item-group" class="form-select" aria-label="Default select example">
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">Septemper</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>

                        </select>
                    </div>
                    <div class="col-lg-1 col-md-6 col-6 mb-2">
                        <label for="StaticsYear" class="form-label"><i class="fa-solid fa-asterisk"></i>Year</label>
                        <input type="number" class="form-control text-center" id="StaticsYear" minlength="4"
                            maxlength="4">
                    </div>

                    <hr class="my-3">
                </div>

                <!-- === position titles ================================================= -->
                <div class="row g-3">
                    <label for="first-row">Total Patients</label>
                    <div class="col-lg-4">
                        <div class="row g-3">
                            <div class="col-lg-8 col-md-6 col-6">
                                <div class="input-group">
                                    <div class="input-group-text"><i class="fa-solid fa-square-plus"></i></div>
                                    <input class="form-control" disabled value="New">
                                </div>
                            </div>
                            <div class="col-lg-4 col-md-6 col-6">
                                <input type="number" class="form-control text-center" id="newPatients"
                                    onkeyup="getTotalPatients()">
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="row g-3">
                            <div class="col-lg-8 col-md-6 col-6">
                                <div class="input-group">
                                    <div class="input-group-text"><i class="fa-solid fa-address-card"></i></div>
                                    <input class="form-control" disabled value="Frequent">
                                </div>
                            </div>
                            <div class="col-lg-4 col-md-6 col-6">
                                <input type="number" class="form-control text-center" id="frequentPatients"
                                    onkeyup="getTotalPatients()">
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="row g-3">
                            <div class="col-lg-8 col-md-6 col-6">
                                <div class="input-group">
                                    <div class="input-group-text total" id="totalPatientsTitleIcon">
                                        <i class="fa-solid fa-user"></i>
                                    </div>
                                    <div class="form-control total text-left" id="totalPatientsTitle">Total</div>
                                </div>
                            </div>
                            <div class="col-lg-4 col-md-6 col-6">
                                <div id="totalPatients" type="number" class="form-control total">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- === Statics Inputs ================================================== -->
                <div class="row">

                    <!-- === Oral Surgery ====== -->
                    <div class="col-xl-4 col-lg-6 col-sm-12 order-md-start">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-red"
                                    value="Surgery & Periodontics">
                            </div>

                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Primary Extraction">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="pedoExreaction">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Permenant Extraction">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="permenantExtraction">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Spare">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="surgicalSpare">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Surgical Extraction">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="surgicalExtraction">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Minor Surgery">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="minorSurgery">
                            </div>
                        </div>
                    </div>

                    <!-- === Pedo Restoration ================= -->
                    <div class="col-xl-4 col-lg-6 col-sm-12">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-master-color-dark"
                                    value="Pedo Restoration">
                            </div>

                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Temporary Filling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="pedoTempFilling">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Amalgam Filling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="pedoAmalgamFilling">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Composite Filling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="pedoCompositeFilling">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Glass Ionomer Filling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="pedoGIC">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="pulpotomy Visit">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="pedoPulpotomyVisit">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="pulpotomy Filling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="pedoPulpotomyFilling">
                            </div>
                        </div>
                    </div>

                    <!-- === Adult Restoration ================ -->
                    <div class="col-xl-4 col-lg-6 col-sm-12">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-red"
                                    value="Permenant Restoration">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Temporary Filling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="PermenantTemporary">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Amalgam Filling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="permenantAmalgam">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Composite Filling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="permenantComposite">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Glass Ionomer Filling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="permenantGIC">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="RCT Visit">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="RCTVisit">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="RCT Filling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="RCTFilling">
                            </div>
                        </div>
                    </div>

                    <!-- === Periodontics ===================== -->
                    <div class="col-xl-4 col-lg-6 col-sm-12">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-master-color-dark"
                                    value="Gingival Procedures">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Scaling">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="scaling">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Gingival Procedures">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="gingivalProcedures">
                            </div>
                        </div>
                    </div>

                    <!-- === Treatments ====================== -->
                    <div class="col-xl-4 col-lg-6 col-sm-12">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-red" value="Treatment">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Treatment">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="drugsTreatment">
                            </div>
                        </div>
                    </div>

                    <!-- === Transition ====================== -->
                    <div class="col-xl-4 col-lg-6 col-sm-12">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-master-color-dark"
                                    value="Transition">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Internal Transition">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="internalTransition">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="External Transition">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="externalTransition">
                            </div>
                        </div>
                    </div>

                    <!-- === Radiation ======================= -->
                    <div class="col-xl-4 col-lg-6 col-sm-12">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-red" value="Radiation">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Periapical X-ray">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="periapicalRadiation">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Panoramic X-ray">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="panoramicRadiation">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Cone Beam CT">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="coneBeamCT">
                            </div>
                        </div>
                    </div>

                    <!-- === Prosthodontics ================== -->
                    <div class="col-xl-4 col-lg-6 col-sm-12">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-master-color-dark"
                                    value="Removable Prosthodontics">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Full Mouth">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="prosFullMouth"
                                    onkeyup="getTotalProsthodontics()">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Single Arch">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="prosSingleArch"
                                    onkeyup="getTotalProsthodontics()">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Partial More Than 3">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="prosPartialMoreThanThree"
                                    onkeyup="getTotalProsthodontics()">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Partial Less than 3">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="prosPartialLessThanThree"
                                    onkeyup="getTotalProsthodontics()">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Repairs">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="prosRepairs"
                                    onkeyup="getTotalProsthodontics()">
                            </div>
                            <div class="col-md-8 col-6">
                                <div class="form-control text-left total" id="prosTotalTitle">Total Prosthodontics</div>
                            </div>
                            <div class="col-md-4 col-6">
                                <div type="number" class="form-control text-center total" id="prosTotal"></div>
                            </div>



                        </div>
                    </div>

                    <!-- === Others ========================== -->
                    <div class="col-xl-4 col-lg-6 col-sm-12">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-red" value="Others">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Implant">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="implant">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Orthodontic Visit">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="orthodontics">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Crown & Bridges">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="fixedProsthodontics">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="St-St Crown">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="stStCrown">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Flouride Application">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="flourideApplication">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Pit & Fissure Sealant">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="pitAndFissureSealant">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Other">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="otherCases">
                            </div>
                        </div>
                    </div>
                </div>


                <!-- === health education titles ========================================= -->
                <div class="row">
                    <!-- ============================================= First Health Education Groub ============================================= -->
                    <div class="col-xl-4 col-lg-6 col-sm-12">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-master-color-dark"
                                    value="Pregnants Follow up">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="New Pregnants">
                            </div>

                            <div class="col-md-4 col-6">
                                <input onkeyup="getTotalPregnant()" id="newPregnant" type="number"
                                    class="form-control text-center">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Frequent Pregnants">
                            </div>
                            <div class="col-md-4 col-6">
                                <input onkeyup="getTotalPregnant()" id="frequentPregnant" type="number"
                                    class="form-control text-center">
                            </div>
                            <div class="col-md-8 col-6">
                                <div class="form-control text-left total" id="totalPregnantTitle">Pregnant Total</div>
                            </div>
                            <div class="col-md-4 col-6">
                                <div id="totalPregnant" class="form-control total"></div>
                            </div>
                        </div>
                    </div>
                    <!-- ============================================= Second Health Education Groub ============================================= -->
                    <div class="col-xl-4 col-lg-6 col-sm-12">
                        <div class="row pt-5 g-3">
                            <div class="col-md-12">
                                <input disabled class="form-control text-center text-white bg-master-color-dark"
                                    value="Pregnants' Oral Health">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Healthy Gingiva">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="healthyGingiva">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Bleeding Gingiva">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="bleedingGingiva">
                            </div>
                            <div class="col-md-8 col-6">
                                <input class="form-control" disabled value="Gingival Calculus">
                            </div>
                            <div class="col-md-4 col-6">
                                <input type="number" class="form-control text-center" id="gingivalCalculus">
                            </div>

<!DOCTYPE html>
<html lang="en">

<head>
  <!-- ============================================= Meta tags ============================================= -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Statics Output, Egyptian Ministry of Health & Population,
    Alexandria Health Affairs Directorate, Public Administration of Dental Health" />

  <!-- ============================================= CSS files ============================================= -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
    integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous" />
  <link rel="shortcut icon" href="../svg/portrait-PADH-light.svg" type="image/x-icon" />

  <!-- ============================================= CSS font Awesome files ============================================= -->
  <link rel="stylesheet" href="../css/font-awesome.css" />
  <!-- == Normalize means, that file can fix any webkit without adding webkit for all classes == -->
  <link rel="stylesheet" href="../css/normalize.css" />
  <!-- ============================================= google font ============================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
    rel="stylesheet" />
  <!-- ============================================= CSS Master document files ============================================= -->
  <link rel="stylesheet" href="../css/main.css" />
  <!-- ============================================= print media CSS ============================================= -->
  <link rel="stylesheet" href="../css/print.css" />
  <!-- ============================================= tab title ============================================= -->
  <title>Statics Output</title>
</head>

<body>
  <div id="PADHANavBar"></div>

  <!-- ============================================= Content ============================================= -->
  <div class="master-color mt-5">
    <div class="container mobile-padding">
      <main>
        <div class="row gx-3 gy-3 mb-5">
          <div class="col-lg-2 col-md-4">
            <label class="form-label">District</label>
            <select class="form-select" aria-label="Default select example" id="districtList">
              <option selected>All</option>
              <option value="1">Montaza</option>
              <option value="2">East</option>
              <option value="3">Middle</option>
              <option value="4">West</option>
              <option value="5">Gomrok</option>
              <option value="6">Agamy</option>
              <option value="7">Amria</option>
              <option value="8">Borg AlArab</option>
            </select>
          </div>
          <div class="col-lg-2 col-md-4">
            <label class="form-label">Unit</label>
            <select class="form-select" aria-label="Default select example" id="unitList">
              <option selected>All</option>
              <option value="Montaza">Al Montaza Al-Elagia</option>
              <option value="Montaza">Al-Sehha Al-Mehania</option>
              <option value="Montaza">Three</option>
              <option value="Montaza">Three</option>
              <option value="Middle">Three</option>
              <option value="Middle">Three</option>
              <option value="Middle">Three</option>
              <option value="Middle">Three</option>
              <option value="Gomrok">Three</option>
              <option value="Gomrok">Three</option>
              <option value="Gomrok">Three</option>
              <option value="Montaza">Three</option>
              <option value="Montaza">Three</option>
            </select>
          </div>
          <div class="col-lg-2 col-md-4 col-6">
            <label class="form-label">Service Type</label>
            <select class="form-select" aria-label="Default select example">
              <option selected>All</option>
              <option value="1">Theraputic</option>
              <option value="2">Protective</option>
            </select>
          </div>
          <div class="col-lg-2 col-md-3 col-6">
            <label class="form-label">Financial Type</label>
            <select class="form-select" aria-label="Default select example">
              <option selected>All</option>
              <option value="1">Free</option>
              <option value="2">Economic</option>
            </select>
          </div>
          <div class="col-lg-2 col-md-3 col-6">
            <label class="form-label">Month</label>
            <select class="form-select" aria-label="Default select example">
              <option selected>All</option>
              <option value="1">January</option>
              <option value="2">February</option>
              <option value="3">March</option>
              <option value="4">April</option>
              <option value="5">May</option>
              <option value="6">June</option>
              <option value="7">July</option>
              <option value="8">August</option>
              <option value="9">September</option>
              <option value="10">October</option>
              <option value="11">November</option>
              <option value="12">December</option>
            </select>
          </div>
          <div class="col-lg-1 col-md-3 col-6">
            <label class="form-label">Year</label>
            <select class="form-select" aria-label="Default select example">
              <option selected>All</option>
              <option value="1">2020</option>
              <option value="2">2021</option>
              <option value="3">2022</option>
              <option value="4">2023</option>
              <option value="5">2024</option>
              <option value="6">2025</option>
            </select>
          </div>
          <div class="col-lg-1 col-md-3">
            <label class="form-label text-white">Search</label>
            <button class="btn btn-padha form-control" type="button">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <!-- ============================================= Personal data Output ============================================= -->
        <div class="table-responsive search-table">
          <table class="table align-middle table-hover" id="myTableSort">
            <thead>
              <tr class="table-header align-middle">
                <th scope="col serial" onclick="sortTable(1)">
                  <i class="fa-solid fa-sort" style="transform: translateY(0%); padding: 5px"></i>
                </th>
                <th scope="col" class="text-nowrap" style="cursor: pointer" onclick="sortTable(2)">
                  Unit Name<i class="fa-solid fa-sort" style="transform: translateY(0%)"></i>
                </th>
                <th scope="col" class="text-nowrap sort-icon" onclick="sortTable(3)">
                  Following<i class="fa-solid fa-sort"></i>
                </th>
                <th scope="col" class="text-nowrap">Service Type</th>
                <th scope="col" class="text-nowrap">Fin Type</th>
                <th scope="col" class="text-nowrap sort-icon">Month</th>
                <th scope="col" class="text-nowrap">Year</th>
                <th scope="col" class="text-nowrap">Anasthesia</th>
                <th scope="col" class="text-nowrap">New p.</th>
                <th scope="col" class="text-nowrap">Frequent p.</th>
                <th scope="col" class="text-nowrap">Per. Ext</th>
                <th scope="col" class="text-nowrap">Pedo. Ext</th>
                <th scope="col" class="text-nowrap">minor Surgery</th>
                <th scope="col" class="text-nowrap">8iyar</th>
              </tr>
            </thead>
            <tbody id="myTable">
              <tr>
                <th class="serial text-center" scope="row">1</th>
                <td class="text-nowrap" id="unitName">
                  Alex Dental Research Center
                </td>
                <td class="text-nowrap" id="following">
                  Health affairs Directorate
                </td>
                <td class="text-nowrap" id="serviceType">Thearputic</td>
                <td class="text-nowrap" id="financialType">Free</td>
                <td class="text-center text-nowrap" id="staticMonth">
                  January
                </td>
                <td class="text-center text-nowrap" id="staticYear">2022</td>
                <td class="text-center text-nowrap" id="">2022</td>
                <td class="text-center text-nowrap" id="">65</td>
                <td class="text-center text-nowrap" id="">25</td>
                <td class="text-center text-nowrap" id="">775</td>
                <td class="text-center text-nowrap" id="">527</td>
                <td class="text-center text-nowrap" id="">4534</td>
                <td class="text-center text-nowrap" id="">4543</td>
              </tr>
            </tbody>
          </table>
        </div>
        <br class="my-2" />
      </main>
    </div>
  </div>

  <div id="PADHAFooter"></div>
</body>

<!-- ========================================= Javascript, Jquery & owl scripts ========================================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"
  crossorigin="anonymous"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<script src="../js/NavBars.js"></script>
<script src="../js/main.js"></script>

</html>

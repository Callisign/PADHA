<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-form</title>
    <link rel="shortcut icon" href="../Callisign_Codes/Images/13.png" type="image/x-icon" />
    <link rel="Stylesheet" href="../Callisign_Codes/CSS/new-dentist.css">
</head>

<body>
    <div class="new-dentist-form">
        <div class="form-box">
            <form id="Login" class="input-gp">
                <input class="input-field" type="text" placeholder="User Name" name="Username" autofocus required>
                <input class="input-field" type="password" name="Password" placeholder="Write a complex Password"
                    required>
                <input id="remember-me" class="check-box" type="checkbox"><span><label for="remember-me">Remember
                        Me</label></span>
                <button class="submit-btn" type="submit">Log In</button>
            </form>
        </div>
    </div>
</body>

</html>
